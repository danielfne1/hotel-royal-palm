<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Reserva - Royal Palm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h2 class="section-title">Confirmar Disponibilidad</h2>
        <form style="max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Tu Nombre</label>
                <input type="text" placeholder="Ej. Juan Pérez" style="width: 100%; padding: 10px;">
            </div>
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Hotel Seleccionado</label>
                <select style="width: 100%; padding: 10px;">
                    <option>Royal Palm Madrid Central</option>
                    <option>Royal Palm Barcelona</option>
                    <option>Royal Palm Valencia</option>
                </select>
            </div>
            <div class="input-group" style="margin-bottom: 15px;">
                <label>Fecha de Entrada</label>
                <input type="date" style="width: 100%; padding: 10px;">
            </div>
            <button type="submit" class="btn-reservar" style="width: 100%; border: none; cursor: pointer;">Consultar ahora</button>
        </form>
    </main>
</body>
</html>
